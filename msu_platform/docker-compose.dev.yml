services:
  # PostgreSQL Database (Dev)
  db:
    image: postgres:15-alpine
    container_name: msu_platform_db_dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-msu_platform}
      - POSTGRES_USER=${POSTGRES_USER:-msu_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme123}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msu_user} -d ${POSTGRES_DB:-msu_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Dev)
  redis:
    image: redis:7-alpine
    container_name: msu_platform_redis_dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Web Application (Dev)
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: msu_platform-backend-dev
    container_name: msu_platform_web_dev
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
      - media_volume_dev:/app/media
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-django-insecure-docker-dev-jwt}
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-msu_user}:${POSTGRES_PASSWORD:-changeme123}@db:5432/${POSTGRES_DB:-msu_platform}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - CSRF_TRUSTED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker (Dev)
  celery_worker:
    profiles: ["workers"]
    image: msu_platform-backend-dev
    container_name: msu_platform_celery_worker_dev
    command: celery -A config worker -l info -Q default,video
    volumes:
      - .:/app
      - media_volume_dev:/app/media
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-django-insecure-docker-dev-jwt}
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-msu_user}:${POSTGRES_PASSWORD:-changeme123}@db:5432/${POSTGRES_DB:-msu_platform}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat (Dev)
  celery_beat:
    profiles: ["workers"]
    image: msu_platform-backend-dev
    container_name: msu_platform_celery_beat_dev
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-docker-dev}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-django-insecure-docker-dev-jwt}
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-msu_user}:${POSTGRES_PASSWORD:-changeme123}@db:5432/${POSTGRES_DB:-msu_platform}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # React Frontend (Dev)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: msu_platform_frontend_dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_DEV_PROXY_TARGET=http://web:8000
      - VITE_DEV_HOST=0.0.0.0
      - VITE_DEV_PORT=5173
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - web

volumes:
  postgres_data_dev:
  media_volume_dev:
  frontend_node_modules_dev:

networks:
  default:
    name: msu_platform_network_dev
