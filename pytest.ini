[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --nomigrations
    --cov=apps
    --cov-report=html
    --cov-report=term-missing:skip-covered
    --maxfail=1
    -v
    --tb=short
testpaths = msu_platform/apps
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    authentication: marks authentication related tests
    permissions: marks permission related tests
    feed: marks feed algorithm tests
    search: marks search functionality tests
    media: marks media processing tests
