<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Clubs (Plain)</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header>
    <h1>Campus Clubs</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="register.html">Register Club</a>
      <a href="login.html" aria-current="page">Login</a>
    </nav>
  </header>

  <main>
    <h2>Club Login</h2>
    <form novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="club@campus.edu" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="••••••••" required />

      <button type="button" onclick="alert('This is a plain static page. Use /login in the Flask app to actually log in.')">Login</button>
    </form>
  </main>

  <footer>
    <p>© 2025 Campus Clubs</p>
  </footer>
</body>
</html>
