<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Clubs Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <header>
      <h1>School Clubs</h1>
      <nav>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      </nav>
    </header>
    <main>
      <h2>Clubs Directory</h2>
      <p>Explore clubs. This page uses plain HTML, CSS and JavaScript with dummy MSU-like data.</p>

      <div class="controls">
        <input id="searchInput" type="search" placeholder="Search clubs by name or category" />
        <select id="categoryFilter">
          <option value="">All categories</option>
        </select>
      </div>

      <div id="clubsList" class="clubs-list"></div>
    </main>
    <footer>
      <small>Made for school clubs</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      // Fetch clubs from server and render list; show modal with charts on click
      const clubsListEl = document.getElementById('clubsList');
      const searchInput = document.getElementById('searchInput');
      const categoryFilter = document.getElementById('categoryFilter');
      const modal = document.createElement('div'); modal.id = 'clubModal'; modal.className = 'modal'; document.body.appendChild(modal);

      function escapeHtml(s){ if(!s) return ''; return s.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;'); }

      function renderClubCard(club){
        const div = document.createElement('div');
        div.className = 'club-card';
        div.innerHTML = `<h3>${escapeHtml(club.name)}</h3>
                         <p class="muted">${escapeHtml(club.category || '')}</p>
                         <p>${escapeHtml(club.description || '')}</p>
                         <p class="small"><strong>Contact:</strong> ${escapeHtml(club.email || 'n/a')}</p>`;
        div.addEventListener('click', ()=> openClubModal(club.id));
        return div;
      }

      async function openClubModal(id){
        // fetch details and history
        const [res, resHist] = await Promise.all([fetch(`/api/clubs/${id}`), fetch(`/api/clubs/${id}/history`)]);
        if(!res.ok) return alert('Failed to load club');
        const club = await res.json();
        const history = resHist.ok ? await resHist.json() : [];

        modal.innerHTML = `
          <div class="modal-panel">
            <button class="modal-close">×</button>
            <h2>${escapeHtml(club.name)}</h2>
            <p class="muted">${escapeHtml(club.category || '')} • ${escapeHtml(club.email || '')}</p>
            <p>${escapeHtml(club.description || '')}</p>
            <div class="charts">
              <div class="chart-card"><canvas id="membersChart"></canvas></div>
              <div class="chart-card"><canvas id="eventsChart"></canvas></div>
            </div>
            <div class="stats-row">
              <div class="stat"><strong>Current Members</strong><div id="currentMembers" class="stat-val"></div></div>
              <div class="stat"><strong>Total Events (12m)</strong><div id="totalEvents" class="stat-val"></div></div>
            </div>
          </div>`;

        modal.querySelector('.modal-close').addEventListener('click', closeClubModal);
        modal.classList.add('open');

        // prepare chart data
        const labels = history.map(h=> h.date);
        const membersData = history.map(h=> h.members);
        const eventsData = history.map(h=> h.events);

        // Members line chart
        const mctx = document.getElementById('membersChart').getContext('2d');
        new Chart(mctx, {
          type: 'line',
          data: { labels, datasets: [{ label: 'Members', data: membersData, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,0.08)', fill: true, tension:0.2 }] },
          options: { responsive:true, plugins: { legend:{ display:false } }, scales:{ x:{ display:true }, y:{ beginAtZero:true } } }
        });

        // Events bar chart
        const ectx = document.getElementById('eventsChart').getContext('2d');
        new Chart(ectx, {
          type: 'bar',
          data: { labels, datasets: [{ label: 'Events', data: eventsData, backgroundColor: '#16a34a' }] },
          options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true } } }
        });

        // Fill quick stats
        document.getElementById('currentMembers').textContent = membersData.length ? membersData[membersData.length-1] : 'N/A';
        document.getElementById('totalEvents').textContent = eventsData.reduce((a,b)=>a+b,0);
      }

      function closeClubModal(){ modal.classList.remove('open'); modal.innerHTML = ''; }

      function renderList(clubs){ clubsListEl.innerHTML = ''; if(clubs.length===0){ clubsListEl.innerHTML='<p>No clubs found.</p>'; return } const frag=document.createDocumentFragment(); clubs.forEach(c=>frag.appendChild(renderClubCard(c))); clubsListEl.appendChild(frag); }

      function uniqueCategories(clubs){ const s=new Set(); clubs.forEach(c=>{ if(c.category) s.add(c.category); }); return Array.from(s).sort(); }

      async function loadClubs(){
        const res = await fetch('/api/clubs');
        const clubs = res.ok ? await res.json() : [];
        const cats = uniqueCategories(clubs);
        categoryFilter.innerHTML = '<option value="">All categories</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
        window.__CLUBS = clubs;
        renderList(clubs);
      }

      function applyFilters(){ const q = searchInput.value.trim().toLowerCase(); const cat = categoryFilter.value; const filtered = (window.__CLUBS || []).filter(c=>{ const inCat = !cat || c.category===cat; const matchesQ = !q || (c.name.toLowerCase().includes(q) || (c.category && c.category.toLowerCase().includes(q)) || (c.description && c.description.toLowerCase().includes(q))); return inCat && matchesQ; }); renderList(filtered); }

      searchInput.addEventListener('input', applyFilters);
      categoryFilter.addEventListener('change', applyFilters);

      // load clubs on start
      loadClubs();
    </script>
  </body>
</html>
