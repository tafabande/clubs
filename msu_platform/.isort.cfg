[settings]
# Profile for compatibility with black
profile = black

# Line length
line_length = 120

# Import heading comments
import_heading_stdlib = Standard library imports
import_heading_thirdparty = Third-party imports
import_heading_firstparty = Local imports
import_heading_localfolder = Local folder imports

# Known modules
known_django = django
known_third_party = rest_framework,celery,redis,boto3,PIL,environ
known_first_party = apps,config

# Sections
sections = FUTURE,STDLIB,DJANGO,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

# Multi-line output mode (3 = Vertical Hanging Indent)
multi_line_output = 3

# Include trailing comma
include_trailing_comma = True

# Force grid wrap
force_grid_wrap = 0

# Use parentheses
use_parentheses = True

# Ensure newline before comments
ensure_newline_before_comments = True

# Split on trailing comma
split_on_trailing_comma = True

# Skip files and directories
skip =
    migrations,
    venv,
    .venv,
    env,
    .env,
    build,
    dist,
    node_modules,
    staticfiles,
    media,
    __pycache__

# Skip glob patterns
skip_glob =
    */migrations/*.py,
    */venv/*,
    */.venv/*

# Force single line imports
force_single_line = False

# Force alphabetical sorting within sections
force_alphabetical_sort_within_sections = False

# Case sensitive sorting
case_sensitive = False

# Order by type
order_by_type = True

# Atomic imports
atomic = True

# Lines after imports
lines_after_imports = 2

# Lines between sections
lines_between_sections = 1

# Force sort within sections
force_sort_within_sections = False

# No lines before
no_lines_before = LOCALFOLDER

# Default section
default_section = THIRDPARTY

# Treat comments as code
treat_comments_as_code = []

# Treat all comments as code
treat_all_comments_as_code = False
