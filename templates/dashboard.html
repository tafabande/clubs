<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clubs — Dashboard</title>
    <link rel="stylesheet" href="../static/style.css" />
  </head>
  <body>
    <header>
      <h1>Campus Clubs</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="socials.html">Socials</a>
      </nav>
    </header>

    <main>
      <section style="max-width:1100px; margin:28px auto; padding:18px">
        <h2>Clubs Dashboard</h2>
        <div class="controls">
          <input id="searchInput" type="search" placeholder="Search clubs by name, category, or description…" />
          <select id="categoryFilter">
            <option value="">All categories</option>
          </select>
        </div>

        <div class="stats-row">
          <div class="stat"><div>Clubs</div><div id="statClubs" class="stat-val">—</div></div>
          <div class="stat"><div>Categories</div><div id="statCats" class="stat-val">—</div></div>
          <div class="stat"><div>Joined</div><div id="statJoined" class="stat-val">0</div></div>
        </div>

        <div id="clubsList" class="clubs-list" aria-live="polite"></div>

        <!-- Details Modal -->
        <div id="clubModal" class="modal" aria-hidden="true" role="dialog" aria-modal="true">
          <div class="modal-panel">
            <button class="modal-close" id="modalClose" aria-label="Close">×</button>
            <div id="modalContent"></div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2025 Campus Clubs</p>
    </footer>

    <script src="../static/clubs.js"></script>
    <script src="../static/dashboard.js"></script>
    <script>
      // Fallback/population if external scripts are missing: load clubs and populate list
      (function(){
        function renderList(list){
          const container = document.getElementById('clubsList'); container.innerHTML='';
          list.forEach(c=>{
            const el = document.createElement('article'); el.className='club-card';
            el.innerHTML = `<h3>${c.name}</h3><p class='muted'>${c.category||'Uncategorized'}</p><p class='small'>${(c.description||'').slice(0,140)}</p><div class='card-actions'><a class='btn btn-view' href='club_detail.html?id=${c.id}'>View</a><button class='btn btn-details' data-id='${c.id}'>Join</button></div>`;
            container.appendChild(el);
          });
        }
        fetch('../static/clubs.json').then(r=>r.json()).then(list=>{
          document.getElementById('statClubs').textContent = list.length;
          const cats = new Set(list.map(c=>c.category||'Uncategorized'));
          document.getElementById('statCats').textContent = cats.size;
          document.getElementById('statJoined').textContent = JSON.parse(localStorage.getItem('joinedClubs')||'[]').length;
          const sel = document.getElementById('categoryFilter'); cats.forEach(cat=>{ const o=document.createElement('option'); o.value=cat; o.textContent=cat; sel.appendChild(o) });
          renderList(list);

          // Add event delegation for Join buttons
          document.getElementById('clubsList').addEventListener('click', e=>{
            const btn = e.target.closest('.btn-details'); if(!btn) return;
            const id = btn.dataset && btn.dataset.id ? Number(btn.dataset.id) : null; if(!id) return;
            const set = new Set(JSON.parse(localStorage.getItem('joinedClubs')||'[]'));
            set.add(id); localStorage.setItem('joinedClubs', JSON.stringify([...set]));
            btn.textContent = 'Joined'; btn.disabled = true;
            document.getElementById('statJoined').textContent = JSON.parse(localStorage.getItem('joinedClubs')||'[]').length;
          });

        }).catch(()=>{ document.getElementById('clubsList').textContent='Failed to load clubs.' });
      })();

      // Category filter and search behavior (client-side)
      document.getElementById('searchInput').addEventListener('input', function(){
        const q = this.value.toLowerCase(); const items = document.querySelectorAll('#clubsList .club-card');
        items.forEach(it=>{ const txt = it.textContent.toLowerCase(); it.style.display = txt.indexOf(q) === -1 ? 'none' : '' });
      });
      document.getElementById('categoryFilter').addEventListener('change', function(){
        const val = this.value; const items = document.querySelectorAll('#clubsList .club-card');
        items.forEach(it=>{ if(!val) { it.style.display=''; return } const cat = it.querySelector('.muted')?.textContent || ''; it.style.display = cat === val ? '' : 'none' });
      });
    </script>
  </body>
</html>
