repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        description: Trims trailing whitespace in files
      - id: end-of-file-fixer
        name: Fix end of files
        description: Ensures files end with a newline
      - id: check-yaml
        name: Check YAML
        description: Validates YAML files
      - id: check-json
        name: Check JSON
        description: Validates JSON files
      - id: check-toml
        name: Check TOML
        description: Validates TOML files
      - id: check-added-large-files
        name: Check for large files
        description: Prevents giant files from being committed
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: Check for merge conflicts
        description: Check for files that contain merge conflict strings
      - id: check-case-conflict
        name: Check for case conflicts
        description: Check for files with names that would conflict on case-insensitive filesystems
      - id: detect-private-key
        name: Detect private keys
        description: Detects the presence of private keys

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: Format with black
        description: Auto-format Python code with black
        language_version: python3.11
        args: ['--line-length=120']

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort imports with isort
        description: Auto-sort Python imports
        args: ['--profile=black', '--line-length=120']

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint with flake8
        description: Lint Python code with flake8
        args: ['--max-line-length=120', '--extend-ignore=E203,W503']
        additional_dependencies: [
          'flake8-docstrings',
          'flake8-bugbear',
          'flake8-comprehensions',
        ]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        name: Type check with mypy
        description: Static type checking for Python
        args: ['--ignore-missing-imports', '--no-strict-optional']
        additional_dependencies: [
          'types-requests',
          'types-redis',
          'django-stubs',
        ]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        name: Security scan with bandit
        description: Find common security issues in Python code
        args: ['-ll', '-i', '--skip', 'B308,B703']
        exclude: ^tests/

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-crlf
        name: Forbid CRLF line endings
      - id: remove-crlf
        name: Remove CRLF line endings
      - id: forbid-tabs
        name: Forbid tabs
        exclude: '(Makefile|\.mk)$'

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.2
    hooks:
      - id: pyupgrade
        name: Upgrade Python syntax
        description: Automatically upgrade syntax for newer Python versions
        args: ['--py311-plus']

  - repo: local
    hooks:
      - id: django-check
        name: Django system check
        description: Run Django's system check framework
        entry: bash -c 'cd msu_platform && python manage.py check'
        language: system
        pass_filenames: false
        always_run: true

      - id: django-migrations-check
        name: Check for missing migrations
        description: Check if any model changes need migrations
        entry: bash -c 'cd msu_platform && python manage.py makemigrations --check --dry-run'
        language: system
        pass_filenames: false
        files: 'models\.py$'

      - id: pytest-check
        name: Run fast tests
        description: Run tests marked as fast
        entry: bash -c 'cd msu_platform && pytest -m "not slow" --tb=short'
        language: system
        pass_filenames: false
        stages: [push]

default_language_version:
  python: python3.11

# Configuration
fail_fast: false
minimum_pre_commit_version: '3.0.0'
